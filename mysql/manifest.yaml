apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: roboshop
  labels:
    project: roboshop 
    tier: db 
    component : mysql 
spec:
  replicas: 1
  selector:
    matchLabels:
      project : roboshop 
      tier : db 
      component : mysql
  template:
    metadata:
      labels:
        project: roboshop
        tier : db 
        component : mysql 
    spec:
      containers:
      - name: mysql 
        image: shaikaliasif/mysql:1.4.0  

--- 
apiVersion: v1
kind: Service
metadata:
  name: mysql 
  namespace: roboshop
  labels: 
   project: roboshop 
   tier: db 
   component : mysql 
spec:   # this help service to match the exactly labels 
  selector:
    project: roboshop 
    tier : db 
    component : mysql
  ports:
    - protocol: TCP
      port: 3306
      targetPort: 3306