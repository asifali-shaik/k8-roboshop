apiVersion: v1
kind: ConfigMap
metadata: 
  name: shipping 
  namespace: roboshop 
  labels:
    project: roboshop
    tier : backend 
    component: shipping
data:
  CART_ENDPOINT="cart:8080"
  DB_HOST="mysql"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipping 
  namespace: roboshop
  labels:
    project: roboshop 
    tier: backend 
    component : shipping
spec:
  replicas: 1
  selector:
    matchLabels:
      project : roboshop 
      tier : backend  
      component : shipping 
  template:
    metadata:
      labels:
        project: roboshop
        tier : backend 
        component : shipping  
    spec:
      containers:
      - name: shipping
        imagePullPolicy: Always 
        image: shaikaliasif/shipping:1.4.0 
        resources:
          requests:
            cpu: "300m"
            memory: "300Mi"
          limits:
            cpu: "300m"
            memory: "350Mi"
        readinessProbe:
          # httpGet:
          #   path: /health
          #   port: 8080
          tcpSocket:
            port: 8080
          failureThreshold: 2
          periodSeconds: 10
          initialDelaySeconds: 15
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          failureThreshold: 2
          periodSeconds: 10
        startupProbe:
          httpGet:
            path: /health
            port: 8080
          failureThreshold: 20
          periodSeconds: 10
        envFrom:
         - configMapRef:
            name: shipping

--- 
apiVersion: v1
kind: Service 
metadata:
  name: shipping
  namespace: roboshop
  labels: 
   project: roboshop 
   tier: backend 
   component : shipping 
spec:   # this help service to match the exactly labels 
  selector:
    project: roboshop 
    tier : backend 
    component : shipping
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080